services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5153:5153"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5153
    depends_on:
      - db
    volumes:
      - ./Schmeconomics.Api:/app/Schmeconomics.Api
      - ./Schmeconomics.Entities:/app/Schmeconomics.Entities
    command: |
      sh -c "
        dotnet ef database update &&
        dotnet run --project /app/Schmeconomics.Api/Schmeconomics.Api.csproj
      "

  #client:
  #  build:
  #    context: .
  #    dockerfile: Dockerfile.client
  #  ports:
  #    - "3000:3000"
  #  environment:
  #    - NUXT_PUBLIC_API_BASE_URL=http://localhost:5153
  #  depends_on:
  #    - api
  #  volumes:
  #    - ./schmeconomics.client:/app/schmeconomics.client

  db:
    image: keinos/sqlite3:latest
    volumes:
      - db_data:/app/db
    command: |
      sh -c "
        touch /app/db/app.db &&
        chmod 777 /app/db/app.db
      "

volumes:
  db_data:
