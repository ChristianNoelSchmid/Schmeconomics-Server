version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5153:5153"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5153
      - AllowedOrigins=http://localhost:3000,http://host.docker.internal:3000
    volumes:
      - ./Schmeconomics.Api/app.db:/app/app.db
    command: |
      sh -c "
        dotnet run --project /app/Schmeconomics.Api/Schmeconomics.Api.csproj
      "

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://api:5153
    depends_on:
      - api
    volumes:
      - ./schmeconomics.client:/app/schmeconomics.client

